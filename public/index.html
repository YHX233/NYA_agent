<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nybble Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-light">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4">
            <div class="max-w-5xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gray-900 rounded-lg flex items-center justify-center text-white text-sm font-medium">
                        N
                    </div>
                    <span class="text-lg font-medium tracking-tight">Nybble Agent</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="w-2 h-2 rounded-full bg-gray-300" id="status-dot"></span>
                        <span class="text-gray-500" id="status-text">未连接</span>
                    </div>
                    <button id="lang-toggle" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
                        EN
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-5xl mx-auto w-full p-6">
            <!-- Connection Bar -->
            <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
                <div class="flex items-center gap-4 flex-wrap">
                    <select id="port-select" class="flex-1 min-w-[200px] bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        <option value="">选择串口...</option>
                    </select>
                    <select id="baudrate-select" class="w-32 bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        <option value="9600">9600</option>
                        <option value="57600">57600</option>
                        <option value="115200" selected>115200</option>
                    </select>
                    <button id="connect-btn" class="px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                        连接
                    </button>
                    <button id="disconnect-btn" class="px-6 py-2 bg-white text-gray-700 border border-gray-200 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors hidden">
                        断开
                    </button>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg w-fit">
                <button class="tab-btn active px-4 py-2 text-sm font-medium rounded-md transition-all" data-tab="control">控制</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium rounded-md transition-all text-gray-500 hover:text-gray-700" data-tab="chat">AI</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium rounded-md transition-all text-gray-500 hover:text-gray-700" data-tab="settings">设置</button>
            </div>

            <!-- Control Tab -->
            <section id="control-tab" class="tab-content active space-y-6">
                <!-- Quick Actions -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button class="action-btn bg-white border border-gray-200 rounded-xl p-4 hover:border-gray-400 hover:shadow-sm transition-all group" data-action="sit">
                        <div class="text-2xl mb-2 group-hover:scale-110 transition-transform">🪑</div>
                        <div class="text-sm font-medium">坐下</div>
                    </button>
                    <button class="action-btn bg-white border border-gray-200 rounded-xl p-4 hover:border-gray-400 hover:shadow-sm transition-all group" data-action="balance">
                        <div class="text-2xl mb-2 group-hover:scale-110 transition-transform">⚖️</div>
                        <div class="text-sm font-medium">站立</div>
                    </button>
                    <button class="action-btn bg-white border border-gray-200 rounded-xl p-4 hover:border-gray-400 hover:shadow-sm transition-all group" data-action="rest">
                        <div class="text-2xl mb-2 group-hover:scale-110 transition-transform">😴</div>
                        <div class="text-sm font-medium">休息</div>
                    </button>
                    <button class="action-btn bg-white border border-gray-200 rounded-xl p-4 hover:border-gray-400 hover:shadow-sm transition-all group" data-action="hi">
                        <div class="text-2xl mb-2 group-hover:scale-110 transition-transform">👋</div>
                        <div class="text-sm font-medium">打招呼</div>
                    </button>
                </div>

                <!-- Movement -->
                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">移动</h3>
                    <div class="flex justify-center">
                        <div class="grid grid-cols-3 gap-2">
                            <div></div>
                            <button class="move-btn w-16 h-16 bg-gray-50 border border-gray-200 rounded-xl hover:bg-gray-100 hover:border-gray-300 transition-all flex items-center justify-center text-xl" data-gait="walk_forward">↑</button>
                            <div></div>
                            <button class="move-btn w-16 h-16 bg-gray-50 border border-gray-200 rounded-xl hover:bg-gray-100 hover:border-gray-300 transition-all flex items-center justify-center text-xl" data-gait="walk_left">←</button>
                            <button class="move-btn w-16 h-16 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition-all flex items-center justify-center text-xl" data-skill="balance">●</button>
                            <button class="move-btn w-16 h-16 bg-gray-50 border border-gray-200 rounded-xl hover:bg-gray-100 hover:border-gray-300 transition-all flex items-center justify-center text-xl" data-gait="walk_right">→</button>
                            <div></div>
                            <button class="move-btn w-16 h-16 bg-gray-50 border border-gray-200 rounded-xl hover:bg-gray-100 hover:border-gray-300 transition-all flex items-center justify-center text-xl" data-gait="back">↓</button>
                            <div></div>
                        </div>
                    </div>
                </div>

                <!-- Advanced -->
                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">高级</h3>
                    <div class="flex gap-3">
                        <input type="text" id="custom-command" placeholder="输入命令 (如: kbalance)" 
                            class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        <button id="send-command" class="px-6 py-3 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                            发送
                        </button>
                    </div>
                </div>

                <!-- Joints -->
                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider">关节控制</h3>
                        <button id="toggle-joints" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
                            展开
                        </button>
                    </div>
                    <div id="joints-container" class="hidden space-y-4">
                        <div id="joints-controls" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Joints will be rendered here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chat Tab -->
            <section id="chat-tab" class="tab-content hidden">
                <div class="bg-white rounded-xl border border-gray-200 h-[500px] flex flex-col">
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                        <div class="text-center text-gray-400 text-sm py-8">
                            <p>与 AI 对话来控制机器猫</p>
                            <div class="flex gap-2 justify-center mt-4 flex-wrap">
                                <button class="example-btn px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200 transition-colors" data-msg="坐下">坐下</button>
                                <button class="example-btn px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200 transition-colors" data-msg="向前走">向前走</button>
                                <button class="example-btn px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200 transition-colors" data-msg="打个招呼">打招呼</button>
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-200 p-4">
                        <div class="flex gap-3">
                            <input type="text" id="chat-input" placeholder="输入指令..." disabled
                                class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                            <button id="chat-send" disabled class="px-6 py-3 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                发送
                            </button>
                        </div>
                        <label class="flex items-center gap-2 mt-3 text-sm text-gray-500">
                            <input type="checkbox" id="auto-execute" checked class="rounded border-gray-300">
                            <span>自动执行</span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settings-tab" class="tab-content hidden space-y-6">
                <!-- AI Settings -->
                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">AI 设置</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">提供商</label>
                            <select id="api-provider" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="moonshot">Moonshot</option>
                                <option value="zhipu">Zhipu AI</option>
                                <option value="qwen">Qwen</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">API Key</label>
                            <input type="password" id="api-key" placeholder="sk-..."
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        </div>
                        <div class="flex gap-3">
                            <select id="api-model" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                                <option value="">选择模型...</option>
                            </select>
                            <button id="save-apikey" class="px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                                保存
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Serial Settings -->
                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">串口设置</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">默认串口</label>
                            <input type="text" id="default-port" placeholder="/dev/ttyUSB0"
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">默认波特率</label>
                            <input type="number" id="default-baudrate" value="115200"
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-gray-400 transition-colors">
                        </div>
                    </div>
                    <button id="save-serial" class="mt-4 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                        保存串口设置
                    </button>
                </div>
            </section>
        </main>

        <!-- Log Panel -->
        <div class="border-t border-gray-200 bg-white">
            <div class="max-w-5xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">日志</span>
                    <button id="clear-logs" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">清除</button>
                </div>
                <div id="log-container" class="h-24 overflow-y-auto text-xs font-mono text-gray-500 space-y-1">
                </div>
            </div>
        </div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
